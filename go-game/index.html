<!doctype html><html><body><canvas id="board" width="600" height="600"></canvas><script>const size=9,board=[...Array(size)].map(()=>Array(size).fill(0));let turn=1;const c=document.getElementById("board"),ctx=c.getContext("2d");function draw(){ctx.clearRect(0,0,600,600);for(let i=0;i<size;i++){ctx.beginPath();ctx.moveTo(50,50+i*60);ctx.lineTo(50+60*(size-1),50+i*60);ctx.stroke();ctx.beginPath();ctx.moveTo(50+i*60,50);ctx.lineTo(50+i*60,50+60*(size-1));ctx.stroke();}for(let y=0;y<size;y++)for(let x=0;x<size;x++){if(board[y][x]){ctx.beginPath();ctx.arc(50+x*60,50+y*60,20,0,Math.PI*2);ctx.fillStyle=board[y][x]==1?"black":"white";ctx.fill();ctx.stroke();}}}c.onclick=e=>{const rect=c.getBoundingClientRect();let x=Math.round((e.clientX-rect.left-50)/60);let y=Math.round((e.clientY-rect.top-50)/60);if(x>=0&&y>=0&&x<size&&y<size&&board[y][x]==0){board[y][x]=turn;turn=3-turn;draw();}};draw();</script></body></html>
